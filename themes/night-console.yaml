# Night Console — DEPLOYED copy
# Live at /config/themes/night-console.yaml on the HA box (sarthak.local).
# Edit there (File editor add-on) and run Developer Tools → YAML → reload
# "Frontend themes"; this file is the reference copy.

Night Console:
  primary-color: "#E8A33D"
  accent-color: "#E8A33D"
  primary-background-color: "#0B0D12"
  secondary-background-color: "#10131A"
  card-background-color: "rgba(255,255,255,0.055)"
  ha-card-background: "rgba(255,255,255,0.055)"
  ha-card-border-color: "rgba(255,255,255,0.09)"
  ha-card-border-radius: "18px"
  ha-card-box-shadow: "none"
  ha-card-backdrop-filter: "blur(12px)"
  lovelace-background: "radial-gradient(120% 60% at 12% 0%, rgba(232,163,61,0.14), transparent 55%), radial-gradient(120% 70% at 100% 100%, rgba(64,180,220,0.10), transparent 55%), #0B0D12"
  primary-text-color: "#EDEEF2"
  secondary-text-color: "#8B8F99"
  text-primary-color: "#14161B"
  disabled-text-color: "#5A5E68"
  divider-color: "rgba(255,255,255,0.08)"
  state-icon-color: "#8B8F99"
  state-icon-active-color: "#E8A33D"
  paper-item-icon-color: "#8B8F99"
  paper-item-icon-active-color: "#E8A33D"
  slider-color: "#E8A33D"
  slider-track-color: "rgba(255,255,255,0.12)"
  app-header-background-color: "rgba(11,13,18,0.85)"
  app-header-text-color: "#EDEEF2"
  sidebar-background-color: "#0B0D12"
  sidebar-selected-icon-color: "#E8A33D"
  state-climate-cool-color: "#6FC3DD"
  state-climate-heat-color: "#E8A33D"
  error-color: "#E5484D"
  warning-color: "#E8A33D"
  success-color: "#5CB884"
  info-color: "#6FC3DD"
  # Bubble Card glass (pop-ups + buttons pick these up)
  bubble-main-background-color: "rgba(22,26,34,0.85)"
  bubble-pop-up-background-color: "rgba(14,17,23,0.92)"
  bubble-button-background-color: "rgba(255,255,255,0.07)"
  bubble-icon-background-color: "rgba(255,255,255,0.09)"
  bubble-accent-color: "#E8A33D"
  bubble-border-radius: "24px"
  # Dialogs & menus — must be near-opaque or the page bleeds through
  # (more-info dialogs inherit card-background-color otherwise)
  mdc-theme-surface: "#141821"
  ha-dialog-surface-background: "rgba(17,21,28,0.97)"
  ha-dialog-border-radius: "22px"
  paper-dialog-background-color: "#141821"
  mdc-text-field-fill-color: "rgba(255,255,255,0.06)"
  input-fill-color: "rgba(255,255,255,0.06)"
  input-ink-color: "#EDEEF2"
  input-label-ink-color: "#8B8F99"
  code-editor-background-color: "#10131A"
