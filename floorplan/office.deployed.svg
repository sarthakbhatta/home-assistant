<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560">
  <style>svg{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif}.title{fill:#EDEEF2;font-size:17px;font-weight:800;letter-spacing:6px}.subtitle{fill:#5A5E68;font-size:11px;letter-spacing:2px}.room{fill:rgba(255,255,255,0.045);stroke:rgba(255,255,255,0.10);stroke-width:1;transition:fill 0.3s}.room.outdoor{stroke-dasharray:5 4}.label{fill:#8B8F99;font-size:12px;font-weight:700;letter-spacing:3px}.tiny{fill:#6A6F79;font-size:9px;font-weight:600;letter-spacing:1.5px}#office-temp{fill:#EDEEF2;font-size:32px;font-weight:300}g[id^="light."]{cursor:pointer}.halo{opacity:0;transition:opacity 0.7s ease;pointer-events:none}.ring{fill:none;stroke:rgba(255,255,255,0.18);stroke-width:1.5;transition:stroke 0.4s}.bulb{fill:rgba(255,255,255,0.22);transition:fill 0.4s,filter 0.4s}.light-on .halo{opacity:1}.light-on .ring{stroke:rgba(255,226,176,0.9)}.light-on .bulb{fill:#FFE9C4;filter:drop-shadow(0 0 6px rgba(255,214,150,0.9))}g[id^="light."]:hover .ring{stroke:#E8A33D}.striprect{fill:rgba(255,255,255,0.10);transition:fill 0.5s}.stripglow{opacity:0;transition:opacity 0.6s}.light-on .striprect{fill:url(#stripG)}.light-on .stripglow{opacity:0.9;filter:blur(6px)}g[id^="climate."]{cursor:pointer}.acunit{fill:rgba(255,255,255,0.10);stroke:rgba(255,255,255,0.18);transition:all 0.5s}.fanring{stroke:rgba(255,255,255,0.2);stroke-width:1.5;transition:stroke 0.5s}.fanblade{fill:rgba(255,255,255,0.35);transition:fill 0.5s}.fan{transform-box:fill-box;transform-origin:center}.ac-on .fan{animation:fp-spin 1.4s linear infinite}.ac-on .fanblade{fill:#9FD8EC}.ac-on .fanring{stroke:rgba(111,195,221,0.8)}.ac-on .acunit{stroke:rgba(111,195,221,0.7);filter:drop-shadow(0 0 7px rgba(111,195,221,0.6))}@keyframes fp-spin{to{transform:rotate(360deg)}}g[id^="switch."]{cursor:pointer}.desk{fill:rgba(255,255,255,0.05);stroke:rgba(255,255,255,0.14);transition:stroke 0.5s}.bolt{fill:rgba(255,255,255,0.28);transition:fill 0.4s,filter 0.4s}.plug-on .bolt{fill:#5CB884;filter:drop-shadow(0 0 7px rgba(92,184,132,0.9))}.plug-on .desk{stroke:rgba(92,184,132,0.55)}.pump{fill:none;stroke:rgba(255,255,255,0.3);stroke-width:2;transition:stroke 0.4s}.pumpring{fill:none;stroke:rgba(255,255,255,0.14);stroke-width:1.5;transform-box:fill-box;transform-origin:center}.pump-on .pump{stroke:#E8A33D;filter:drop-shadow(0 0 8px rgba(232,163,61,0.9))}.pump-on .pumpring{stroke:rgba(232,163,61,0.7);animation:fp-pulse 1.5s ease-in-out infinite}@keyframes fp-pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.35);opacity:0.4}}.doorleaf{stroke:#8B8F99;stroke-width:3.5;stroke-linecap:round;transform-box:fill-box;transform-origin:top center;transition:transform 0.9s cubic-bezier(0.34,1.2,0.64,1),stroke 0.5s}.doorarc{fill:none;stroke:rgba(255,255,255,0.08);stroke-dasharray:3 4;opacity:0;transition:opacity 0.5s}.hinge{fill:#8B8F99}.door-open .doorleaf{transform:rotate(-74deg);stroke:#E5484D;filter:drop-shadow(0 0 6px rgba(229,72,77,0.8))}.door-open .doorarc{opacity:1}.mcore{fill:rgba(255,255,255,0.3);transition:fill 0.4s}.ripple{fill:none;stroke:#E8A33D;stroke-width:2;opacity:0;transform-box:fill-box;transform-origin:center}.motion-on .mcore{fill:#E8A33D}.motion-on .ripple{animation:fp-rip 1.8s ease-out infinite}.motion-on .ripple.r2{animation-delay:0.6s}@keyframes fp-rip{0%{opacity:0.85;transform:scale(0.3)}100%{opacity:0;transform:scale(2.4)}}g[id^="valve."]{cursor:pointer}.drop{fill:rgba(255,255,255,0.18);transition:fill 0.4s,filter 0.4s}.valve-open .drop{fill:#6FC3DD;filter:drop-shadow(0 0 7px rgba(111,195,221,0.9))}</style><defs><radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFE2B0" stop-opacity="0.95"/><stop offset="45%" stop-color="#E8A33D" stop-opacity="0.5"/><stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/></radialGradient><linearGradient id="stripG" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF7A3D"/><stop offset="55%" stop-color="#E8A33D"/><stop offset="100%" stop-color="#FFD9A0"/></linearGradient><radialGradient id="ambA" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E8A33D" stop-opacity="0.10"/><stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/></radialGradient><radialGradient id="ambC" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#40B4DC" stop-opacity="0.08"/><stop offset="100%" stop-color="#40B4DC" stop-opacity="0"/></radialGradient></defs><rect x="0" y="0" width="900" height="560" fill="#0B0D12"/><ellipse cx="140" cy="60" rx="420" ry="240" fill="url(#ambA)"/><ellipse cx="820" cy="520" rx="420" ry="260" fill="url(#ambC)"/><text x="50" y="38" class="title">FIRST FLOOR</text><text x="850" y="38" text-anchor="end" class="subtitle">sarthak.local</text><rect x="50" y="60" width="420" height="300" rx="14" class="room"/><text x="70" y="90" class="label">OFFICE</text><g id="light.office_downlight_1"><circle class="halo" cx="170" cy="160" r="52" fill="url(#halo)"/><circle class="ring" cx="170" cy="160" r="11"/><circle class="bulb" cx="170" cy="160" r="6"/></g><g id="light.office_downlight_2"><circle class="halo" cx="350" cy="160" r="52" fill="url(#halo)"/><circle class="ring" cx="350" cy="160" r="11"/><circle class="bulb" cx="350" cy="160" r="6"/></g><g id="light.smart_light_strip1"><rect class="stripglow" x="70" y="336" width="380" height="8" rx="4" fill="url(#stripG)"/><rect class="striprect" x="70" y="338" width="380" height="5" rx="2.5"/></g><g id="switch.office_main_desk"><rect class="desk" x="90" y="250" width="130" height="52" rx="9"/><path class="bolt" d="M158 258 L146 278 L154 278 L148 294 L164 272 L155 272 Z"/><text x="155" y="316" text-anchor="middle" class="tiny">WORKSTATION</text></g><g id="climate.panasonic_ac_panasonic_ac"><rect class="acunit" x="368" y="64" width="84" height="15" rx="6"/><g class="fan"><circle cx="410" cy="104" r="12" fill="none" class="fanring"/><path class="fanblade" d="M410 94 C414 98 414 102 410 104 C406 102 406 98 410 94 Z"/><path class="fanblade" d="M401 109 C406 107 409 109 410 104 C407 101 403 103 401 109 Z"/><path class="fanblade" d="M419 109 C417 103 413 101 410 104 C411 109 414 107 419 109 Z"/></g></g><text id="office-temp" x="265" y="230" text-anchor="middle">--°</text><text x="265" y="252" text-anchor="middle" class="tiny">INSIDE</text><rect x="490" y="60" width="160" height="130" rx="14" class="room"/><text x="510" y="90" class="label">BATH</text><g id="light.office_bathroom_downlight"><circle class="halo" cx="570" cy="130" r="38" fill="url(#halo)"/><circle class="ring" cx="570" cy="130" r="9"/><circle class="bulb" cx="570" cy="130" r="5"/></g><rect x="670" y="60" width="180" height="300" rx="14" class="room outdoor"/><text x="690" y="90" class="label">TERRACE</text><g id="binary_sensor.terrace_door_sensor_door"><path class="doorarc" d="M672 232 A58 58 0 0 1 730 290"/><line class="doorleaf" x1="672" y1="232" x2="672" y2="292"/><circle class="hinge" cx="672" cy="232" r="3.5"/></g><g id="binary_sensor.motion_sensor_motion"><circle class="ripple r1" cx="765" cy="170" r="16"/><circle class="ripple r2" cx="765" cy="170" r="16"/><circle class="mcore" cx="765" cy="170" r="5"/><text x="765" y="205" text-anchor="middle" class="tiny">MOTION</text></g><rect x="50" y="400" width="600" height="110" rx="14" class="room"/><text x="70" y="430" class="label">STAIRCASE</text><g id="light.st1"><circle class="halo" cx="150" cy="465" r="34" fill="url(#halo)"/><circle class="ring" cx="150" cy="465" r="8"/><circle class="bulb" cx="150" cy="465" r="4.5"/></g><g id="light.st2"><circle class="halo" cx="330" cy="465" r="34" fill="url(#halo)"/><circle class="ring" cx="330" cy="465" r="8"/><circle class="bulb" cx="330" cy="465" r="4.5"/></g><g id="light.st3"><circle class="halo" cx="510" cy="465" r="34" fill="url(#halo)"/><circle class="ring" cx="510" cy="465" r="8"/><circle class="bulb" cx="510" cy="465" r="4.5"/></g><g id="switch.borewell_motor"><circle class="pumpring" cx="600" cy="465" r="14"/><path class="pump" d="M593 465 a7 7 0 1 1 14 0 a7 7 0 1 1 -14 0 M600 452 L600