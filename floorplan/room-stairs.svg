<svg xmlns="http://www.w3.org/2000/svg" id="fp-root" viewBox="-148.6 -139.4 323.2 367.7" preserveAspectRatio="xMidYMid meet"><style> svg{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif} .room-shadow{fill:rgba(0,0,0,.38);filter:blur(16px)} .pill rect{fill:rgba(12,16,22,.82);stroke:rgba(255,255,255,.14);transition:fill .25s,stroke .25s} .pill text{fill:#F2F5F8;font-size:14px;font-weight:700;letter-spacing:2.4px;text-anchor:middle} /* the pill is the room's tap target -> make that legible */ g[id^="room-"]{cursor:pointer} g[id^="room-"]:hover rect{fill:rgba(30,40,54,.94);stroke:rgba(255,255,255,.42)} .metric{fill:#FFFFFF;font-size:26px;font-weight:300;text-anchor:middle;opacity:.92} /* skewed into the wall plane, so anchor from its start point, not centred */ .wallmetric{text-anchor:start;font-weight:400;opacity:.88;letter-spacing:1px} .rug,.tiles,.lawn{opacity:.9} .contact{fill:#000;filter:blur(5px);pointer-events:none} /* ---------- standing bar lamp (a switch, so on/off only -- no dimming) ---------- */ .bar polygon{transition:fill .45s,filter .45s} .bar.bar-on .f-t,.bar.bar-on .f-r,.bar.bar-on .f-l{ fill:#FFE9BC;filter:drop-shadow(0 0 11px rgba(255,201,120,.95))} /* ---------- badges ---------- */ .badge{cursor:pointer} .badge-ring{fill:none;stroke:rgba(255,255,255,.55);stroke-width:1.5} .badge-core{fill:#2F6BFF} .badge-hub{fill:#fff} .badge:hover .badge-core{fill:#4B82FF} .badge:hover .badge-ring{stroke:#fff} /* ---------- lights ---------- */ .pool{opacity:0;transition:opacity .55s ease;pointer-events:none} .poolel{fill:url(#poolg)} .beam{fill:url(#beamg)} .wallpool{fill:url(#poolg);opacity:0;filter:blur(5px);transition:opacity .55s ease} /* Off-state fixtures must still be findable -- they are the tap targets. A visible ring plus a brighter core beats a faint dot. */ /* Two shapes share this class: a bare circle element in most rooms, and a pendant group (cord + shade + bulb) in the office. Both selectors stay listed so neither form loses its styling. NB: never put angle brackets in this CSS -- it lives inside a style element and the XML parser reads them as real tags. */ circle.fixture,.fixture .bulb{fill:rgba(255,255,255,.55);stroke:rgba(255,255,255,.34); stroke-width:1.4;transition:fill .4s,filter .4s,stroke .4s} .light-on .pool,.pool.light-on{opacity:1} .light-on .wallpool,.wallpool.light-on{opacity:1} circle.fixture.light-on,.fixture.light-on .bulb{fill:#FFF6DF; stroke:rgba(255,226,160,.95);filter:drop-shadow(0 0 16px rgba(255,206,120,1))} /* pendant hardware */ .cord{stroke:#7C8792;stroke-width:1.8} .shade ellipse,.shade polygon{transition:fill .45s,filter .45s} .fixture.light-on .shade ellipse,.fixture.light-on .shade polygon{ fill:#FFDFA4;filter:drop-shadow(0 0 10px rgba(255,201,120,.75))} g[id^="light."]{cursor:pointer} /* LED strip */ .strip polygon{transition:fill .5s} .strip.light-on .f-t{fill:#FFE6B0;filter:drop-shadow(0 0 10px rgba(255,190,90,.9))} .strip.light-on .f-r{fill:#FFCE7A} .strip.light-on .f-l{fill:#F2B45E} /* bedside LED rings */ .ring ellipse{fill:none;stroke:rgba(255,255,255,.18);stroke-width:4;transition:stroke .5s} .ring.light-on ellipse{stroke:#FF7BC0;filter:drop-shadow(0 0 12px rgba(255,90,170,.9))} /* step lights */ .steplight .f-t,.steplight .f-r,.steplight .f-l{transition:fill .4s} .steplight.light-on .f-t{fill:#FFF0CE;filter:drop-shadow(0 0 8px rgba(255,214,140,.95))} /* ---------- AC ---------- */ .fan-ring{fill:none;stroke:rgba(120,140,160,.5);stroke-width:1.5} .fan-b{fill:rgba(140,160,180,.6);transition:fill .5s} .ac.ac-on .f-r,.ac.ac-on .f-t{fill:#DDF3FB} .fan.ac-running .fan-b,.ac-running .fan-b{fill:#6FC3DD} .fan.ac-running .fan-ring,.ac-running .fan-ring{stroke:#6FC3DD} .fan.ac-running,.ac-running .fan{animation:spin 1.3s linear infinite} @keyframes spin{to{transform:rotate(360deg)}} /* ---------- plugs / screens ---------- */ .bolt{fill:rgba(255,255,255,.30);transition:fill .4s,filter .4s} .plug-on .bolt,.bolt.plug-on{fill:#5CB884;filter:drop-shadow(0 0 8px rgba(92,184,132,.95))} .plug.plug-on .f-t{filter:drop-shadow(0 0 6px rgba(92,184,132,.5))} .screen{fill:#171C24;transition:fill .5s} .screen.on{fill:#4FA8E0;filter:drop-shadow(0 0 16px rgba(79,168,224,.8))} /* ---------- pump ---------- */ .pumpring{fill:none} .pumpring circle{fill:none;stroke:rgba(255,255,255,.18);stroke-width:2.5;transition:stroke .4s} .pumphub{fill:rgba(255,255,255,.35);transition:fill .4s} .pumpring.pump-on circle,.pump-on .pumpring circle{stroke:#E8A33D} .pumpring.pump-on,.pump-on .pumpring{animation:pulse 1.5s ease-in-out infinite} .pumphub.pump-on,.pump-on .pumphub{fill:#E8A33D;filter:drop-shadow(0 0 9px rgba(232,163,61,.95))} @keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.25}} /* overheat / overload: the pump goes red and beats faster than its running pulse, so a fault is distinguishable from normal operation at a glance */ .faultmsg{fill:#FF6B63;letter-spacing:2px} .pump.pump-fault .f-t,.pump.pump-fault .f-r,.pump.pump-fault .f-l{fill:#8E2F2A} .pumpring.pump-fault circle,.pump-fault .pumpring circle{stroke:#FF4D42} .pumpring.pump-fault,.pump-fault .pumpring{animation:pulse .7s ease-in-out infinite} .pumphub.pump-fault,.pump-fault .pumphub{fill:#FF4D42; filter:drop-shadow(0 0 11px rgba(255,77,66,.95))} /* ---------- door ---------- */ .leaf-closed{fill:#9FB0C0;stroke:rgba(0,0,0,.2);stroke-width:1;transition:opacity .55s} .leaf-open{fill:#AEBECC;stroke:#E5484D;stroke-width:2;opacity:0;transition:opacity .55s} .door.door-open .leaf-closed{opacity:0} .door.door-open .leaf-open{opacity:1;filter:drop-shadow(0 0 9px rgba(229,72,77,.85))} /* ---------- motion ---------- */ .rip{fill:none;stroke:#E8A33D;stroke-width:2.5;opacity:0;transform-box:fill-box;transform-origin:center} .motion .f-t{transition:fill .4s} .motion-on .f-t{fill:#FFD98A} .motionfx.motion-on .rip{animation:rip 1.9s ease-out infinite} .motionfx.motion-on .rip.r2{animation-delay:.65s} @keyframes rip{0%{opacity:.9;transform:scale(.25)}100%{opacity:0;transform:scale(2.6)}} /* ---------- garden ---------- */ .spray{fill:#6FC3DD;opacity:0;transition:opacity .5s} .spray.valve-open{opacity:.7} .jets path{fill:none;stroke:#A8E4F5;stroke-width:3.2;stroke-linecap:round;opacity:0} .jets.valve-open path{opacity:.9;animation:jet 1.1s ease-out infinite} .jets.valve-open path:nth-child(2){animation-delay:.25s} .jets.valve-open path:nth-child(3){animation-delay:.5s} @keyframes jet{0%{opacity:0;transform:translateY(4px) scale(.6)}35%{opacity:.95}100%{opacity:0;transform:translateY(-6px) scale(1.15)}} .camlens{fill:#2B3946;transition:fill .4s} .cam-on .camlens,.camlens.cam-on{fill:#E5484D;filter:drop-shadow(0 0 7px rgba(229,72,77,.9))} @media (prefers-reduced-motion:reduce){ .ac-running .fan,.pump-on .pumpring,.motionfx.motion-on .rip,.jets.valve-open path{animation:none} } /* drawer: the SVG's own height drives the card's height, which displaces the controls card below it. Percentages will not work here -- the parent is auto-height, so a percentage resolves to auto. Viewport units do. */ /* !important is required: ha-floorplan injects its own `svg{...}` rules into the same shadow root and they otherwise win. */ #fp-root{height:78vh!important;transition:height .34s cubic-bezier(.4,0,.2,1)} #fp-root.drawer-open{height:44vh!important} @media (max-width:700px){ #fp-root{height:58vh!important} #fp-root.drawer-open{height:34vh!important} } .rtitle{fill:#F2F5F8;font-size:26px;font-weight:800;letter-spacing:6px;text-anchor:middle} .handle{cursor:pointer} .handle rect{fill:rgba(18,24,33,.9);stroke:rgba(255,255,255,.18);transition:fill .25s,stroke .25s} .handle text{fill:#C9D2DD;font-size:13px;font-weight:700;letter-spacing:2.2px;text-anchor:middle} .handle:hover rect{fill:rgba(32,42,56,.96);stroke:rgba(255,255,255,.45)} .handle .chev{fill:none;stroke:#C9D2DD;stroke-width:2.2;stroke-linecap:round;transition:transform .34s} #fp-root.drawer-open .handle .chev{transform:rotate(180deg)} </style><defs><linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#101826"/><stop offset="55%" stop-color="#0C1119"/><stop offset="100%" stop-color="#080B10"/></linearGradient><radialGradient id="poolg"><stop offset="0%" stop-color="#FFF8E6" stop-opacity="1"/><stop offset="50%" stop-color="#FFD277" stop-opacity=".82"/><stop offset="100%" stop-color="#FFBE45" stop-opacity="0"/></radialGradient><linearGradient id="beamg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#FFEEC2" stop-opacity=".42"/><stop offset="55%" stop-color="#FFD98F" stop-opacity=".20"/><stop offset="100%" stop-color="#FFC85C" stop-opacity="0"/></linearGradient><radialGradient id="amb" cx="50%" cy="0%" r="80%"><stop offset="0%" stop-color="#2B7FB8" stop-opacity=".28"/><stop offset="100%" stop-color="#2B7FB8" stop-opacity="0"/></radialGradient></defs><rect x="-148.6" y="-139.4" width="323.2" height="367.7" fill="url(#bg)"/><rect x="-148.6" y="-139.4" width="323.2" height="367.7" fill="url(#amb)"/><text class="rtitle" x="13.0" y="-109.4">STAIRCASE</text><g class="room" transform="translate(0.0,0.0)"><ellipse class="room-shadow" cx="13.0" cy="89.0" rx="135.1" ry="63.0"/><polygon points="0.0,0.0 142.9,82.5 26.0,150.0 -116.9,67.5" fill="#E0A92F"/><polygon points="0.0,0.0 142.9,82.5 142.9,4.5 0.0,-78.0" fill="#C17730"/><polygon points="0.0,0.0 -116.9,67.5 -116.9,-10.5 0.0,-78.0" fill="#8B5623"/><polygon points="0.0,-78.0 142.9,4.5 147.4,1.9 4.5,-80.6" fill="#ED923B"/><polygon points="0.0,-78.0 -116.9,-10.5 -121.5,-13.1 -4.5,-80.6" fill="#DC8737"/><polygon points="142.9,82.5 147.4,79.9 147.4,1.9 142.9,4.5" fill="#9D6127"/><polygon points="-116.9,67.5 -121.5,64.9 -121.5,-13.1 -116.9,-10.5" fill="#74481D"/><polygon points="142.9,82.5 26.0,150.0 26.0,156.8 142.9,89.2" fill="#A17A22"/><polygon points="-116.9,67.5 26.0,150.0 26.0,156.8 -116.9,74.2" fill="#7B5D1A"/><ellipse class="wallpool" id="light.st1-pool" cx="-31.8" cy="3.4" rx="34" ry="20"/><ellipse class="wallpool" id="light.st2-pool" cx="-56.5" cy="-0